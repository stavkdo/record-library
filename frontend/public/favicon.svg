<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <radialGradient id="disc" cx="50%" cy="50%" r="55%">
      <stop offset="0%"   stop-color="#ff8a3d" />
      <stop offset="55%"  stop-color="#ff5e3a" />
      <stop offset="100%" stop-color="#ec4899" />
    </radialGradient>
    <linearGradient id="label" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1a1a22" />
      <stop offset="100%" stop-color="#050507" />
    </linearGradient>
    <linearGradient id="sheen" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.18)" />
      <stop offset="100%" stop-color="rgba(255,255,255,0)" />
    </linearGradient>
  </defs>

  <!-- Disc body -->
  <circle cx="50" cy="50" r="48" fill="url(#disc)" />

  <!-- Grooves -->
  <circle cx="50" cy="50" r="44" fill="none" stroke="rgba(0,0,0,0.10)" stroke-width="0.8" />
  <circle cx="50" cy="50" r="39" fill="none" stroke="rgba(0,0,0,0.10)" stroke-width="0.8" />
  <circle cx="50" cy="50" r="34" fill="none" stroke="rgba(0,0,0,0.10)" stroke-width="0.8" />
  <circle cx="50" cy="50" r="29" fill="none" stroke="rgba(0,0,0,0.10)" stroke-width="0.8" />

  <!-- Sheen -->
  <circle cx="50" cy="50" r="48" fill="url(#sheen)" />

  <!-- Label -->
  <circle cx="50" cy="50" r="22" fill="url(#label)" stroke="rgba(255,255,255,0.06)" stroke-width="0.5" />

  <!-- Center hole -->
  <circle cx="50" cy="50" r="3" fill="#ff5e3a" />
</svg>
